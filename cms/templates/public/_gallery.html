{% macro gallery_lightbox(images, alt, link) %}
{% if images %}
  <ul class="gallery">
    {% for g in images %}
      <li>
        <a href="{{ link.media(g.filename, size='large') }}">
          <img src="{{ link.media(g.filename, size='small') }}" alt="{{ alt }}" loading="lazy">
        </a>
      </li>
    {% endfor %}
  </ul>

  <dialog class="lightbox" id="lightbox">
    <button type="button" class="lightbox-close" aria-label="Fermer">&times;</button>
    <button type="button" class="lightbox-prev" aria-label="Image précédente">&#8249;</button>
    <img alt="">
    <button type="button" class="lightbox-next" aria-label="Image suivante">&#8250;</button>
  </dialog>

  <script>
    (function () {
      var links = Array.from(document.querySelectorAll(".gallery a"));
      var dialog = document.getElementById("lightbox");
      var img = dialog.querySelector("img");
      var index = 0;

      function show(i) {
        index = (i + links.length) % links.length;
        img.src = links[index].href;
      }

      links.forEach(function (a, i) {
        a.addEventListener("click", function (e) {
          e.preventDefault();
          show(i);
          dialog.showModal();
        });
      });

      dialog.querySelector(".lightbox-prev").addEventListener("click", function () { show(index - 1); });
      dialog.querySelector(".lightbox-next").addEventListener("click", function () { show(index + 1); });
      dialog.querySelector(".lightbox-close").addEventListener("click", function () { dialog.close(); });
      dialog.addEventListener("click", function (e) {
        if (e.target === dialog) dialog.close();
      });
      dialog.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft") show(index - 1);
        if (e.key === "ArrowRight") show(index + 1);
      });
    })();
  </script>
{% endif %}
{% endmacro %}
