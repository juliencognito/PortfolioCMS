name: Build desktop package (Linux)

# Déclenchement manuel uniquement (onglet Actions -> Run workflow) ; un
# workflow par plateforme pour ne lancer que celle dont on a besoin.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag de release GitHub (laisser vide pour ne pas publier, ex: v1.0.0)"
        required: false
        default: ""

permissions:
  contents: write # nécessaire uniquement si release_tag est renseigné

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller builder/desktop.spec

      # path: dist (pas dist/PortfolioCMS), sinon zip dans le zip :
      # actions/upload-artifact zippe déjà le téléchargement lui-même.
      - uses: actions/upload-artifact@v7
        with:
          name: portfolio-cms-linux-x64
          path: dist

      # un asset de Release est un fichier, pas un dossier
      - name: Zip for release
        if: inputs.release_tag != ''
        run: cd dist && zip -r ../portfolio-cms-linux-x64.zip PortfolioCMS

      - name: Publish to release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          files: portfolio-cms-linux-x64.zip
